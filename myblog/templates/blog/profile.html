{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

   <div class="card-header bg-primary text-white text-center">

    <h2>
        Welcome {{ user.username }}
    </h2>

    <p class="mb-0">
        Manage your posts and profile
    </p>

</div>

    <div class="card-body">

        <div class="mb-3">
            <strong>Username:</strong>
            {{ user.username }}
        </div>

        <div class="mb-3">
            <strong>Total Posts:</strong>
            {{ posts.count }}
        </div>

        <hr>

        <h4 class="mb-3">My Posts</h4>

        {% for post in posts %}

            <div class="card mb-3">

                <div class="card-body">

                    <h5 class="card-title">
                        {{ post.title }}
                    </h5>

                    <p class="badge bg-info">
                        {{ post.category }}
                    </p>

                    <br>

                    <a href="{% url 'blog:post_detail' post.pk %}"
                       class="btn btn-primary btn-sm">
                        View Post
                    </a>

                </div>

            </div>

        {% empty %}

            <div class="alert alert-warning">
                No posts yet.
            </div>

        {% endfor %}

        <a href="{% url 'blog:blogpage' %}"
           class="btn btn-secondary">
            Back to Blog
        </a>

    </div>

</div>

</div>

</body>
</html>
